name: Build and release executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            pyinstaller-name: EVE-ISK-Overlay
            artifact-name: EVE-ISK-Overlay-windows
            artifact-path: dist/EVE-ISK-Overlay.exe
          - name: Linux
            os: ubuntu-latest
            pyinstaller-name: eve-isk-overlay
            artifact-name: eve-isk-overlay-linux
            artifact-path: eve-isk-overlay-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm --clean --onefile --windowed --name ${{ matrix.pyinstaller-name }} eve_isk_overlay.py

      - name: Package Linux executable
        if: runner.os == 'Linux'
        run: chmod +x dist/eve-isk-overlay && tar -C dist -czf ../eve-isk-overlay-linux-x64.tar.gz eve-isk-overlay

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --title "$GITHUB_REF_NAME" --notes "Windows and Linux executable builds."
