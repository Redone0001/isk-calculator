name: Build and release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm --clean --onefile --windowed --name EVE-ISK-Overlay eve_isk_overlay.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVE-ISK-Overlay-windows
          path: dist/EVE-ISK-Overlay.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME dist/EVE-ISK-Overlay.exe --title $env:GITHUB_REF_NAME --notes "Windows executable build."
